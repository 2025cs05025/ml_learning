# Loads JSON dashboards from /var/lib/grafana/dashboards (mounted from monitoring/grafana/dashboards).
---
apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
